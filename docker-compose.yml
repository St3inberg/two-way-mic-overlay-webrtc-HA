services:
  mock-camera:
    image: alexxit/go2rtc:latest
    container_name: mock-webrtc-camera
    ports:
      - "8555:8555" # WebRTC API
      - "1984:1984" # go2rtc Web UI
      - "8554:8554" # RTSP Server
      - "8562:8562" # WebRTC TCP
      - "8562:8562/udp" # WebRTC UDP
    volumes:
      - ./go2rtc.yaml:/config/go2rtc.yaml
    restart: unless-stopped

  webrtc-frontend:
    build: .
    container_name: mock-webrtc-frontend
    ports:
      - "8080:80" # Maps port 8080 on your machine to port 80 on Nginx
    restart: unless-stopped
    depends_on:
      - mock-camera
